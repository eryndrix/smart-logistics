                                  updated_at:
                                    type: string
                                    format: date-time
                                    example: "2026-05-28 23:54:08"
                                    description: Last update timestamp
                      meta:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          from:
                            type: integer
                            example: 1
                          last_page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 15
                          to:
                            type: integer
                            example: 3
                          total:
                            type: integer
                            example: 3
                      links:
                        type: object
                        properties:
                          first:
                            type: string
                            format: uri
                            example: "http://localhost/api/v1/journals/e0377d38-5350-47a2-ba42-30f1a4e6c4e6?page=1"
                          last:
                            type: string
                            format: uri
                            example: "http://localhost/api/v1/journals/e0377d38-5350-47a2-ba42-30f1a4e6c4e6?page=1"
                          prev:
                            type: string
                            nullable: true
                            example: null
                          next:
                            type: string
                            nullable: true
                            example: null
                  metadata:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: "019e6ffa-4da1-73f5-93df-8b138f1d5b0a"
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        example: "2026-05-29T00:05:35+05:00"
                        description: Response timestamp
        '404':
          description: Failed to retrieve journal list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 404
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Failed to retrieve the journal list.
                  metadata:
                    type: object
                    properties:
                      request_id:
                        type: string
                        example: "019e6fc9-52da-71dc-8eb7-6c1a46774197"
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        example: "2026-05-28T23:12:05+05:00"
                        description: Response timestamp

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication