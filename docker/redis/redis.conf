# ═══════════════════════════════════════════════════════════════════════════════
# REDIS TLS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
# Disable plain TCP, use TLS only
port 0

# TLS port
tls-port 6379

# Server certificate files
tls-cert-file /usr/local/etc/redis/redis.crt
tls-key-file /usr/local/etc/redis/redis.key
tls-ca-cert-file /usr/local/etc/redis/ca.crt

# Require client certificate authentication
tls-auth-clients yes

# Secure TLS protocols only
tls-protocols "TLSv1.2 TLSv1.3"

# Strong cipher suites only
tls-ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"

# Prefer server cipher selection
tls-prefer-server-ciphers yes

# ═══════════════════════════════════════════════════════════════════════════════
# SECURITY & USERS
# ═══════════════════════════════════════════════════════════════════════════════
user default off
user redis_user_yl1j8s on >oWnFOoKloAEiv9Siqbj9 ~* +@all

# ═══════════════════════════════════════════════════════════════════════════════
# PERFORMANCE LIMITS
# ═══════════════════════════════════════════════════════════════════════════════
# Maximum concurrent client connections
maxclients 10000

# Memory limits - no key eviction
maxmemory 512mb
maxmemory-policy noeviction

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit slave 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════════
loglevel notice
logfile ""
