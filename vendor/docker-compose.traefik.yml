services:
  # Traefik reverse proxy services
  traefik:
    image: traefik:v3.6.13
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    command:
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.https.address=:443"
      - "--api.dashboard=false"
      - "--api.insecure=false"
    volumes:
      - ./certs:/etc/traefik/certs:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./src/storage/logs:/var/log/traefik:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

# Empty volumes
volumes: {}

# External network
networks:
  app-network:
    external: true
