services:
  # PostgreSQL database service
  postgres:
    image: timescale/timescaledb:2.25.2-pg18
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TIMESCALEDB_TELEMETRY: "off"
      SHARED_PRELOAD_LIBRARIES: "timescaledb"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./certs/postgres.crt:/tmp/certs/postgres.crt:ro
      - ./certs/postgres.key:/tmp/certs/postgres.key:ro
      - ./certs/ca.crt:/tmp/certs/ca.crt:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/docker-entrypoint-custom.sh:/docker-entrypoint-custom.sh:ro
    entrypoint: ["/bin/bash", "/docker-entrypoint-custom.sh"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# Empty volumes
volumes:
  postgres-data:

# External network
networks:
  app-network:
    external: true
