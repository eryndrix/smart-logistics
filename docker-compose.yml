services:
  # PHP application service
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./certs/client.crt:/certs/client.crt:ro
      - ./certs/client.key:/certs/client.key:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
      - ./src:/var/www/html
    working_dir: /var/www/html
    command: |
      sh -c '
        php -d variables_order=EGPCS artisan serve --host=0.0.0.0 --port=8000 &
        php -d variables_order=EGPCS artisan serve --host=0.0.0.0 --port=9000 &
        wait
      '
    networks:
      - app-network
    labels:
      # Main app router
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`)"
      - "traefik.http.routers.app.entrypoints=https"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.service=app-service"
      - "traefik.http.services.app-service.loadbalancer.server.port=8000"
      # Telescope monitoring
      - "traefik.http.routers.telescope.rule=Host(`localhost`) && PathPrefix(`/monitoring`)"
      - "traefik.http.routers.telescope.entrypoints=https"
      - "traefik.http.routers.telescope.tls=true"
      - "traefik.http.routers.telescope.service=telescope-service"
      - "traefik.http.services.telescope-service.loadbalancer.server.port=8000"
      - "traefik.http.routers.telescope.middlewares=telescope-auth@file"

# Empty volumes
volumes: {}

# External network
networks:
  app-network:
    external: true
